<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <style>
        /* Reset für maximale Performance und keine störenden Ränder */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000; /* Schwarzer Hintergrund für besseren Kontrast */
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Verhindert Scrollbalken, das Video füllt den Rest */
        }

        /* Die Eingabeleiste oben */
        #controls {
            display: flex;
            padding: 10px;
            background: #111;
            gap: 10px;
            z-index: 10;
        }

        #embedInput {
            flex-grow: 1;
            padding: 8px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            outline: none;
        }

        #embedInput:focus {
            border-color: #007bff;
        }

        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #0056b3; }
        button.close-btn { background: #dc3545; }
        button.close-btn:hover { background: #c82333; }

        /* Container für den Livestream */
        #player-container {
            flex-grow: 1;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Erzwingt, dass das eingefügte iFrame immer die volle Größe in höchster Auflösung nutzt */
        #player-container iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body>

    <div id="controls">
        <input type="text" id="embedInput" placeholder="Füge hier deinen Embed-Code ein (z.B. <iframe src='...'></iframe>)">
        <button onclick="loadStream()">Starten</button>
        <button class="close-btn" onclick="toggleControls()" title="Leiste ausblenden">X</button>
    </div>

    <div id="player-container">
        <p style="color: #666;">Warte auf iFrame-Code...</p>
    </div>

    <script>
        function loadStream() {
            const input = document.getElementById('embedInput').value;
            const container = document.getElementById('player-container');

            if (input.trim() === '') return;

            // Container leeren und das rohe iFrame direkt in den DOM injizieren (schnellste Methode)
            container.innerHTML = input;

            // Suche nach dem iFrame im DOM, um wichtige Attribute für Vollbild und Qualität zu erzwingen
            const iframe = container.querySelector('iframe');
            if (iframe) {
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('allow', 'autoplay; fullscreen');
            }
        }

        // Leiste ausblenden für ein ablenkungsfreies Vollbild-Erlebnis
        function toggleControls() {
            document.getElementById('controls').style.display = 'none';
        }

        // Mit einem Doppelklick irgendwo auf der Seite kommt die Leiste wieder zurück
        document.body.addEventListener('dblclick', () => {
            document.getElementById('controls').style.display = 'flex';
        });
    </script>
</body>
</html>
