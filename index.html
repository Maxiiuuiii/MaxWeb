<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Livestream Player & Analyzer</title>
    <!-- HLS.js Bibliothek laden -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .input-section { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input[type="text"] {
            width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; 
            color: white; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px;
        }
        button {
            background: #007bff; color: white; border: none; padding: 12px 24px; 
            cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px;
        }
        button:hover { background: #0056b3; }
        .player-wrapper {
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; 
            overflow: hidden; border: 1px solid #333; position: relative;
        }
        iframe, video { width: 100%; height: 100%; border: none; }
        .stats-panel {
            display: flex; gap: 15px; margin-top: 15px; background: #1e1e1e; 
            padding: 20px; border-radius: 8px; font-family: monospace;
        }
        .stat-box { background: #2d2d2d; padding: 15px; border-radius: 6px; flex: 1; text-align: center; }
        .stat-value { font-size: 1.4em; font-weight: bold; color: #00ffcc; display: block; margin-top: 5px; }
        .warning { color: #ffaa00; font-size: 0.9em; margin-top: 15px; display: none; background: #332200; padding: 10px; border-radius: 4px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Livestream Player & Analyzer</h2>
        
        <div class="input-section">
            <label>Iframe-Code ODER direkten Stream-Link (.m3u8) einfügen:</label>
            <input type="text" id="streamInput" placeholder='<iframe src="..."></iframe> oder https://.../stream.m3u8'>
            <button onclick="loadStream()">Stream laden</button>
            <div class="warning" id="corsWarning">
                ⚠️ <b>Iframe erkannt:</b> Da dies ein externer Iframe ist, blockiert der Browser das Auslesen der Stats und das Verändern des Buffers (Same-Origin-Policy). Für volle Funktionen nutze einen direkten .m3u8 Link.
            </div>
        </div>

        <div class="player-wrapper" id="playerContainer">
            <!-- Player oder Iframe landen hier -->
        </div>

        <div class="stats-panel" id="statsPanel">
            <div class="stat-box">Auflösung<span class="stat-value" id="statRes">-</span></div>
            <div class="stat-box">Bitrate<span class="stat-value" id="statBitrate">-</span></div>
            <div class="stat-box">FPS<span class="stat-value" id="statFps">-</span></div>
            <div class="stat-box">Live-Buffer<span class="stat-value" id="statBuffer">-</span></div>
        </div>
    </div>

    <script>
        let hls;

        function loadStream() {
            const input = document.getElementById('streamInput').value.trim();
            const container = document.getElementById('playerContainer');
            const warning = document.getElementById('corsWarning');
            
            // Player resetten
            container.innerHTML = '';
            warning.style.display = 'none';
            resetStats();
            if(hls) { hls.destroy(); }

            // Logik 1: Iframe wurde eingefügt
            if (input.toLowerCase().includes('<iframe')) {
                // Versuche die URL (src) aus dem Iframe zu extrahieren für sauberen Embed
                const match = input.match(/src="([^"]+)"/);
                const src = match ? match[1] : '';
                
                if(src) {
                    const iframe = document.createElement('iframe');
                    iframe.src = src;
                    iframe.setAttribute('allowfullscreen', 'true');
                    container.appendChild(iframe);
                    warning.style.display = 'block'; // Zeige CORS-Warnung
                } else {
                    container.innerHTML = input; // Fallback
                    warning.style.display = 'block';
                }
            } 
            // Logik 2: Direkter HLS-Link (.m3u8) wurde eingefügt
            else if (input.toLowerCase().includes('.m3u8')) {
                const video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                container.appendChild(video);

                if (Hls.isSupported()) {
                    // Buffer maximieren für flüssigeren Stream
                    hls = new Hls({
                        maxBufferLength: 60,       // 60 Sekunden Normal-Buffer (Standard ist oft 30)
                        maxMaxBufferLength: 90,    // Maximaler Buffer bei schlechtem Internet
                        maxBufferSize: 60 * 1000 * 1000, // 60 MB RAM für den Buffer reservieren
                    });
                    
                    hls.loadSource(input);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });

                    // Stats Analyzer: Liest die Metadaten bei jedem Qualitätswechsel aus
                    hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                        const level = hls.levels[data.level];
                        if(level) {
                            document.getElementById('statRes').innerText = level.width + 'x' + level.height;
                            document.getElementById('statBitrate').innerText = Math.round(level.bitrate / 1000) + ' kbps';
                            // Manche Streams senden keine FPS-Daten mit, dann zeigen wir N/A
                            document.getElementById('statFps').innerText = level.frameRate ? Math.round(level.frameRate) : 'N/A';
                        }
                    });

                    // Buffer-Status jede Sekunde aktualisieren
                    setInterval(() => {
                        if(video.buffered.length > 0) {
                            const bufferEnd = video.buffered.end(video.buffered.length - 1);
                            const current = video.currentTime;
                            document.getElementById('statBuffer').innerText = Math.max(0, Math.round(bufferEnd - current)) + 's';
                        }
                    }, 1000);
                }
            } else {
                alert('Bitte einen gültigen Iframe-Code oder eine .m3u8 URL eingeben.');
            }
        }

        function resetStats() {
            document.getElementById('statRes').innerText = '-';
            document.getElementById('statBitrate').innerText = '-';
            document.getElementById('statFps').innerText = '-';
            document.getElementById('statBuffer').innerText = '-';
        }
    </script>
</body>
</html>
