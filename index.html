<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Live Stream Player</title>
    <style>
        /* Farbpalette und Basis-Styling */
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --panel-bg: #1e293b;
            --border-color: #334155;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
            margin-top: 2vh;
        }

        /* --- Eingabebereich für eigenen Iframe --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .input-group input {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .input-group button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .input-group button:hover {
            background-color: var(--accent-hover);
        }

        /* Responsiver Player-Container (16:9) */
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Seitenverhältnis */
            height: 0;
            overflow: hidden;
            background-color: #000;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: filter 0.3s ease; /* Weicher Übergang beim Wechseln der Filter */
            border: none;
        }

        /* --- Filter Profile --- */
        .filter-none { 
            filter: none; 
        }
        .filter-bigscreen { 
            filter: contrast(1.25) saturate(1.3) brightness(1.05); 
        }
        .filter-vibrant { 
            filter: contrast(1.1) saturate(1.6) brightness(1.1); 
        }
        .filter-stadium { 
            filter: contrast(1.15) saturate(1.1) brightness(0.95); 
        }
        .filter-night { 
            filter: contrast(1.1) brightness(0.8) sepia(0.15); 
        }

        /* --- Minimalistisches Kontrollpanel --- */
        .controls {
            margin-top: 20px;
            background-color: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
        }

        select {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, select:hover {
            border-color: var(--accent-color);
        }

        /* --- Toggle Switch Design --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { 
            background-color: var(--accent-color); 
        }
        input:checked + .slider:before { 
            transform: translateX(22px); 
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Neues Eingabefeld für den Iframe -->
        <div class="input-group">
            <input type="text" id="embed-input" placeholder="Füge hier deinen kompletten <iframe... > Code oder eine Stream-URL ein">
            <button id="load-btn">Stream Laden</button>
        </div>

        <div class="player-wrapper" id="player-container">
            <!-- Standard-Iframe beim Laden der Seite -->
            <iframe 
                src="https://bintv.pages.dev/?id=pl-e2c.pages.dev/tntsports2hdfootballlinklatestnew&data=aHR0cHM6Ly9iaW50dnBsYXllci5ibG9nc3BvdC5jb20vP3E9aHR0cHM6Ly9pcGwtZTJjLnBhZ2VzLmRldi90bnRzcG9ydHMyaGRmb290YmFsbGxpbmtsYXRlc3RuZXc=" 
                frameborder="0" 
                allowfullscreen 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="filter-toggle">Filter Aktiv:</label>
                <label class="switch">
                    <input type="checkbox" id="filter-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-group">
                <label for="profile-select">Bild-Profil:</label>
                <select id="profile-select">
                    <option value="filter-bigscreen">Fußball Bigscreen (Kontrast & Schärfe)</option>
                    <option value="filter-vibrant">Vibrant Pitch (Sattes Rasengrün)</option>
                    <option value="filter-stadium">Stadion-Atmosphäre (Klar & Natürlich)</option>
                    <option value="filter-night">Nachtmodus (Augenschonend)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const playerContainer = document.getElementById('player-container');
        const toggle = document.getElementById('filter-toggle');
        const select = document.getElementById('profile-select');
        const embedInput = document.getElementById('embed-input');
        const loadBtn = document.getElementById('load-btn');

        // Funktion, die den Filter auf den AKTUELLEN iFrame anwendet
        function updateFilter() {
            // Holt sich immer den Iframe, der gerade im Container ist
            const currentIframe = playerContainer.querySelector('iframe');
            if (!currentIframe) return;

            // Alte Klassen entfernen
            currentIframe.classList.remove('filter-none', 'filter-bigscreen', 'filter-vibrant', 'filter-stadium', 'filter-night');
            
            if (toggle.checked) {
                currentIframe.classList.add(select.value);
            } else {
                currentIframe.classList.add('filter-none');
            }
        }

        // Funktion um einen neuen Iframe zu laden
        function loadNewStream() {
            const inputValue = embedInput.value.trim();
            if (!inputValue) return;

            let newIframeHTML = '';

            // Prüfen, ob der Nutzer einen kompletten <iframe ...> Tag oder nur einen Link gepostet hat
            if (inputValue.toLowerCase().startsWith('<iframe')) {
                newIframeHTML = inputValue;
            } else if (inputValue.startsWith('http')) {
                // Wenn es nur ein Link ist, bauen wir den Iframe selbst zusammen
                newIframeHTML = `<iframe src="${inputValue}" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            } else {
                alert("Bitte einen gültigen Iframe-Code oder eine URL eingeben.");
                return;
            }

            // Den alten Inhalt im Wrapper mit dem neuen Iframe ersetzen
            playerContainer.innerHTML = newIframeHTML;

            // Den gerade eingefügten Iframe anpassen (damit er CSS ignoriert, das im Code des Nutzers stehen könnte)
            const newlyAddedIframe = playerContainer.querySelector('iframe');
            if (newlyAddedIframe) {
                newlyAddedIframe.removeAttribute('width');
                newlyAddedIframe.removeAttribute('height');
                newlyAddedIframe.removeAttribute('style'); // Entfernt Inline-Styles die das 16:9 Layout kaputt machen könnten
                
                // Filter direkt auf den neuen Stream anwenden
                updateFilter();
                
                // Eingabefeld leeren (optional)
                embedInput.value = '';
            }
        }

        // Listener für Button und Enter-Taste im Eingabefeld
        loadBtn.addEventListener('click', loadNewStream);
        embedInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadNewStream();
            }
        });

        // Listener für Schalter und Dropdown
        toggle.addEventListener('change', updateFilter);
        select.addEventListener('change', updateFilter);

        // Filter beim ersten Laden der Seite initialisieren
        updateFilter();
    </script>
</body>
</html>
