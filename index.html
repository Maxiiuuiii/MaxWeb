<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player - Multi-Source</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6;
            --text: #f8fafc;
            --panel-bg: #1e293b;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transition: filter 0.4s ease-in-out;
        }

        /* --- UI Styling --- */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .control-group {
            background-color: var(--panel-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .control-group h3 {
            margin: 0 0 12px 0;
            font-size: 1rem;
            color: #94a3b8;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background-color: #0f172a;
            color: var(--text);
            border: 2px solid #334155;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #334155;
        }

        button.active {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--primary);
        }

        /* --- CSS Video-Filter --- */
        .filter-normal { filter: none; }
        .filter-bigscreen { filter: contrast(1.15) saturate(1.25) brightness(1.05); }
        .filter-vivid { filter: contrast(1.2) saturate(1.4) brightness(1.1); }
        .filter-night { filter: contrast(1.2) saturate(1.15) brightness(0.9); }
    </style>
</head>
<body>

    <h1>⚽ Live Match Player</h1>

    <div class="player-container">
        <!-- Das iframe lädt standardmäßig Stream 1 -->
        <iframe 
            id="stream-frame" 
            class="filter-normal"
            title="Live Player" 
            src="https://embedsports.top/embed/admin/ppv-bayern-munich-vs-real-madrid/1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="controls-wrapper">
        <!-- Stream Auswahl -->
        <div class="control-group">
            <h3>📡 Stream Quelle wählen:</h3>
            <div class="controls" id="stream-controls">
                <button class="active" onclick="setStream('https://embedsports.top/embed/admin/ppv-bayern-munich-vs-real-madrid/1', this)">Stream 1 (Main)</button>
                <button onclick="setStream('http://dlstreams.com/stream/stream-32.php', this)">Stream 2 (Backup 1)</button>
                <button onclick="setStream('https://ntv.cx/embed?t=RnBicEVST3ZWdWxIOTdKVHE4MlUydFlKR00weWtLd1orQ21LeUtTNTVuQzNJYWN4NEdIQkZMRUM1aHBIKzMyV0R2b1JDZmtxMkNuVCt6WUVjV1NsNjlsbzdEcVdNMUlCMDEvcEh3bE5Cakk9', this)">Stream 3 (Backup 2)</button>
            </div>
        </div>

        <!-- Filter Auswahl -->
        <div class="control-group">
            <h3>🎨 Bild-Filter:</h3>
            <div class="controls" id="filter-controls">
                <button class="active" onclick="setFilter('filter-normal', this)">Standard</button>
                <button onclick="setFilter('filter-bigscreen', this)">📺 Big Screen</button>
                <button onclick="setFilter('filter-vivid', this)">🌿 Vivid Rasen</button>
                <button onclick="setFilter('filter-night', this)">🌙 Abendspiel</button>
            </div>
        </div>
    </div>

    <script>
        // Funktion zum Wechseln der Stream-URL
        function setStream(url, btn) {
            const iframe = document.getElementById('stream-frame');
            // Tauscht die src-URL des iframes aus, um den neuen Stream zu laden
            iframe.src = url;

            // Markiert den aktiven Button in der Stream-Auswahl
            const container = document.getElementById('stream-controls');
            container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Funktion zum Wechseln des CSS-Filters (bleibt über Stream-Wechsel hinweg aktiv)
        function setFilter(filterClass, btn) {
            const iframe = document.getElementById('stream-frame');
            iframe.className = filterClass;

            // Markiert den aktiven Button in der Filter-Auswahl
            const container = document.getElementById('filter-controls');
            container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

</body>
</html>
