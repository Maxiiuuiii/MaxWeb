<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Livestream</title>
    <style>
        /* Reset für Vollbild */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        
        .stream-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Erzwingt GPU-Hardwarebeschleunigung im Browser */
            transform: translateZ(0);
            will-change: transform;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="stream-container">
        <iframe 
            src="https://dlstreams.top/stream/stream-68.php" 
            allowfullscreen 
            allow="autoplay; encrypted-media"
            loading="eager">
        </iframe>
    </div>
</body>
</html>
