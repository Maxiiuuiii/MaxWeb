<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player - Bayern vs Real Madrid</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #3b82f6;
            --text: #f8fafc;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9; /* Hält das 16:9 Format responsive */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Weicher Übergang beim Wechseln der Filter */
            transition: filter 0.4s ease-in-out;
        }

        /* --- Button & UI Styling --- */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        button {
            background-color: #1e293b;
            color: var(--text);
            border: 2px solid #334155;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #334155;
        }

        button.active {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--primary);
        }

        /* --- Die CSS Video-Filter --- */
        
        .filter-normal {
            filter: none;
        }
        
        .filter-bigscreen {
            /* Ideal für TVs: Erhöhter Kontrast, mehr Sättigung für den Rasen und leicht angehobene Helligkeit */
            filter: contrast(1.15) saturate(1.25) brightness(1.05);
        }
        
        .filter-vivid {
            /* Stadion-Modus: Sehr starkes Grün und leuchtende Trikots */
            filter: contrast(1.2) saturate(1.4) brightness(1.1);
        }
        
        .filter-night {
            /* Abendspiel: Etwas dunkler, starker Kontrast, schont die Augen in dunklen Räumen */
            filter: contrast(1.2) saturate(1.15) brightness(0.9);
        }
    </style>
</head>
<body>

    <h1>⚽ Bayern Munich vs Real Madrid</h1>

    <div class="player-container">
        <!-- Dein Embed-Code inkl. ID, um ihn mit JavaScript ansprechen zu können -->
        <iframe 
            id="stream-frame" 
            class="filter-normal"
            title="Bayern Munich vs Real Madrid Player" 
            marginheight="0" 
            marginwidth="0" 
            src="https://embedsports.top/embed/admin/ppv-bayern-munich-vs-real-madrid/1" 
            scrolling="no" 
            allowfullscreen="yes" 
            allow="encrypted-media; picture-in-picture;" 
            width="100%" 
            height="100%" 
            frameborder="0">
        </iframe>
    </div>

    <!-- Steuerelemente für die Filter -->
    <div class="controls">
        <button class="active" onclick="setFilter('filter-normal', this)">Standard</button>
        <button onclick="setFilter('filter-bigscreen', this)">📺 Big Screen (Empfohlen)</button>
        <button onclick="setFilter('filter-vivid', this)">🌿 Vivid Rasen</button>
        <button onclick="setFilter('filter-night', this)">🌙 Abendspiel</button>
    </div>

    <script>
        function setFilter(filterClass, btn) {
            // Sucht das Iframe und ändert dessen Klasse auf den gewählten Filter
            const iframe = document.getElementById('stream-frame');
            iframe.className = filterClass;

            // Markiert den aktuell geklickten Button farblich
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

</body>
</html>
